# fly.io config for the ReadLater sync server.
# Deploy from this directory:  fly deploy --ha=false
app = 'readlater-mbent'
primary_region = 'sjc'

[env]
  READLATER_INBOUND_DOMAIN = 'in.doc-ent.com'

[http_service]
  internal_port = 8090
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = 'readlater_data'
  destination = '/data'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
