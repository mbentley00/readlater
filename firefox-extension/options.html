<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font: 13px system-ui, sans-serif; margin: 0; padding: 14px; min-width: 320px; }
    label { display: block; font-weight: 600; margin: 10px 0 4px; }
    input { width: 100%; box-sizing: border-box; padding: 7px; border: 1px solid #ccc; border-radius: 5px; }
    .row { display: flex; gap: 8px; margin-top: 14px; }
    button { flex: 1; padding: 8px; border: 0; border-radius: 6px; cursor: pointer; }
    #signin { background: #b45309; color: #fff; }
    #test, #saveToken { background: #e5e7eb; }
    #status { margin-top: 10px; min-height: 1.2em; }
    #status.ok { color: #15803d; }
    #status.err { color: #b91c1c; }
    .hint { color: #666; font-size: 12px; margin-top: 4px; }
    details { margin-top: 16px; }
    summary { cursor: pointer; color: #666; font-size: 12px; }
    @media (prefers-color-scheme: dark) {
      body { background: #1f1f1f; color: #eee; }
      input { background: #2b2b2b; color: #eee; border-color: #444; }
      #test, #saveToken { background: #3a3a3a; color: #eee; }
      .hint, summary { color: #999; }
    }
  </style>
</head>
<body>
  <label for="serverUrl">Server URL</label>
  <input id="serverUrl" type="url" placeholder="https://readlater-mbent.fly.dev">

  <label for="username">Username</label>
  <input id="username" autocomplete="username">

  <label for="password">Password</label>
  <input id="password" type="password" autocomplete="current-password">
  <div class="hint">Signing in fetches your account's API token and stores it — your password is not saved.</div>

  <div class="row">
    <button id="signin">Sign in</button>
    <button id="test">Test connection</button>
  </div>
  <div id="status"></div>

  <details>
    <summary>Advanced: use an API token directly</summary>
    <label for="token">API token</label>
    <input id="token" type="password" placeholder="from the web app's Settings page">
    <div class="row"><button id="saveToken">Save token</button></div>
  </details>

  <script src="options.js"></script>
</body>
</html>
